<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <title>Happy 2nd Anniversary ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Lato:wght@400;700&display=swap"
          rel="stylesheet">

    <style>

        /* ───────────────── RESET ───────────────── */

        *, *::before, *::after {

            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {

            font-family: 'Lato', sans-serif;

            background: #fff8f5;

            color: #333;

            min-height: 100vh;

            overflow-x: hidden;

            display: flex;

            flex-direction: column;

            align-items: center;

            justify-content: center;

            text-align: center;

            padding: 40px 20px;

            position: relative;
        }

        /* ───────────────── FLOATING HEARTS ───────────────── */

        #hearts-canvas {

            position: fixed;

            inset: 0;

            overflow: hidden;

            pointer-events: none;

            z-index: 0;
        }

        .heart {

            position: absolute;

            bottom: -60px;

            animation: floatUp linear forwards;

            opacity: 0.8;
        }

        @keyframes floatUp {

            0% {

                transform: translateY(0) rotate(0deg);

                opacity: 0.8;
            }

            100% {

                transform: translateY(-120vh) rotate(25deg);

                opacity: 0;
            }
        }

        /* ───────────────── HEADING ───────────────── */

        h1 {

            font-family: 'Playfair Display', serif;

            font-style: italic;

            font-size: clamp(2rem, 5vw, 3.2rem);

            color: #e8315a;

            margin-bottom: 35px;

            position: relative;

            z-index: 2;

            text-shadow:
                0 4px 14px rgba(232,49,90,0.14);
        }

        /* ───────────────── CARD ───────────────── */

        .card {

            width: 100%;

            max-width: 430px;

            background: white;

            border-radius: 22px;

            padding: 28px 24px;

            box-shadow:
                0 6px 18px rgba(232,49,90,0.08),
                0 18px 42px rgba(232,49,90,0.12);

            position: relative;

            z-index: 2;

            min-height: 380px;

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            margin-bottom: 28px;
        }

        /* ───────────────── POLAROID ───────────────── */

        .polaroid-wrap {

            background: white;

            padding:
                10px
                10px
                28px;

            border-radius: 4px;

            box-shadow:
                0 5px 18px rgba(0,0,0,0.15);

            transform: rotate(-1.5deg);

            width: 100%;

            max-width: 340px;

            display: none;
        }

        #mem-img {

            width: 100%;

            max-height: 260px;

            object-fit: cover;

            display: block;

            border-radius: 2px;
        }

        /* ───────────────── TEXT ───────────────── */

        #mem-text {

            margin-top: 22px;

            color: #e8315a;

            font-family: 'Playfair Display', serif;

            font-size: clamp(1rem, 3vw, 1.2rem);

            line-height: 1.6;

            font-weight: 600;

            max-width: 340px;
        }

        /* ───────────────── FADE ANIMATION ───────────────── */

        @keyframes fadeUp {

            from {

                opacity: 0;

                transform: translateY(14px);
            }

            to {

                opacity: 1;

                transform: translateY(0);
            }
        }

        .fade-in {

            animation: fadeUp 0.6s ease both;
        }

        /* ───────────────── SHIMMER ───────────────── */

        .loading {

            background:
                linear-gradient(
                    90deg,
                    #ffe0e6 25%,
                    #fff0f2 50%,
                    #ffe0e6 75%
                );

            background-size: 200% 100%;

            animation: shimmer 1.2s infinite;

            min-height: 220px;
        }

        @keyframes shimmer {

            0% {

                background-position: 200% 0;
            }

            100% {

                background-position: -200% 0;
            }
        }

        /* ───────────────── MAIN BUTTON ───────────────── */

        .main-btn {

            background:
                linear-gradient(
                    135deg,
                    #ff4d6d 0%,
                    #e8315a 100%
                );

            color: white;

            border: none;

            padding: 16px 38px;

            border-radius: 50px;

            font-size: 1.05rem;

            font-weight: 700;

            cursor: pointer;

            box-shadow:
                0 8px 24px rgba(232,49,90,0.28);

            transition: 0.2s ease;

            position: relative;

            z-index: 2;
        }

        .main-btn:hover {

            transform:
                translateY(-2px)
                scale(1.04);
        }

        .main-btn:active {

            transform:
                scale(0.96);
        }

        /* ───────────────── MUSIC BUTTON ───────────────── */

        #music-btn {

            position: fixed;

            bottom: 22px;

            right: 22px;

            width: 52px;

            height: 52px;

            border-radius: 50%;

            border: 2px solid #ffd7e0;

            background: white;

            color: #e8315a;

            font-size: 1.3rem;

            cursor: pointer;

            z-index: 999;

            display: flex;

            align-items: center;

            justify-content: center;

            box-shadow:
                0 6px 18px rgba(232,49,90,0.2);

            transition: 0.2s ease;
        }

        #music-btn:hover {

            transform: scale(1.08);
        }

        #music-btn.muted {

            color: #bbb;

            border-color: #eee;
        }

    </style>

</head>

<body>

    <!-- Floating Hearts -->

    <div id="hearts-canvas"></div>

    <!-- Background Music -->

    <audio id="bg-music"
           loop
           preload="auto">

        <source src="music.mp3"
                type="audio/mpeg">

    </audio>

    <!-- Music Toggle -->

    <button id="music-btn"
            onclick="toggleMusic()">

        ♪

    </button>

    <!-- Heading -->

    <h1>Happy 2nd Anniversary ❤️</h1>

    <!-- Card -->

    <div class="card">

        <div class="polaroid-wrap"
             id="polaroid">

            <img id="mem-img"
                 src=""
                 alt="Our Memory">

        </div>

        <p id="mem-text">

            Click the button below to reveal a memory 💕

        </p>

    </div>

    <!-- Reveal Button -->

    <button class="main-btn"
            onclick="startExperience()">

        Reveal a Memory 💖

    </button>

    <!-- SCRIPT -->

    <script>

        /* ───────────────── IMAGE LIST ───────────────── */

        const imageNames = [

            '1.jpg',
            '2.jpg',
            '3.jpg',
            '4.jpg',
            '5.jpg',

            '6.jpg',
            '7.jpg',
            '8.jpg',
            '9.jpg',
            '10.jpg',

            '11.jpg',
            '12.jpg',
            '13.jpg',
            '14.jpg',
            '15.jpg'
        ];

        /* ───────────────── MUSIC ───────────────── */

        const music =
            document.getElementById(
                'bg-music'
            );

        const musicBtn =
            document.getElementById(
                'music-btn'
            );

        let musicStarted = false;

        let isMuted = false;

        music.volume = 0.35;

        function startExperience() {

            if (!musicStarted) {

                music.load();

                music.play()

                    .then(() => {

                        musicStarted = true;

                    })

                    .catch((err) => {

                        console.log(
                            "Music blocked:",
                            err
                        );
                    });
            }

            generateMemory();
        }

        function toggleMusic() {

            isMuted = !isMuted;

            music.muted = isMuted;

            musicBtn.textContent =
                isMuted ? '🔇' : '♪';

            musicBtn.classList.toggle(
                'muted',
                isMuted
            );
        }

        /* ───────────────── SAYINGS ───────────────── */

        let sayingsList = [];

        let shuffledQueue = [];

        let queueIndex = 0;

        fetch('sayings.txt')

            .then(res => res.text())

            .then(data => {

                sayingsList = data

                    .split(',')

                    .map(s => s.trim())

                    .filter(Boolean);

                shuffledQueue =
                    shuffle([...sayingsList]);
            })

            .catch(() => {

                document.getElementById(
                    'mem-text'
                ).innerText =
                    "Couldn't load sayings 💔";
            });

        function shuffle(arr) {

            for (

                let i = arr.length - 1;

                i > 0;

                i--

            ) {

                const j =
                    Math.floor(
                        Math.random()
                        * (i + 1)
                    );

                [arr[i], arr[j]] =
                    [arr[j], arr[i]];
            }

            return arr;
        }

        function nextSaying() {

            if (

                queueIndex >=
                shuffledQueue.length

            ) {

                shuffledQueue =
                    shuffle([...sayingsList]);

                queueIndex = 0;
            }

            return shuffledQueue[
                queueIndex++
            ];
        }

        /* ───────────────── GENERATE MEMORY ───────────────── */

        function generateMemory() {

            if (!sayingsList.length)
                return;

            const saying =
                nextSaying();

            const randomImage =
                imageNames[
                    Math.floor(
                        Math.random()
                        * imageNames.length
                    )
                ];

            const polaroid =
                document.getElementById(
                    'polaroid'
                );

            const imgEl =
                document.getElementById(
                    'mem-img'
                );

            const textEl =
                document.getElementById(
                    'mem-text'
                );

            polaroid.style.display =
                'block';

            polaroid.classList.add(
                'loading'
            );

            textEl.innerText = '...';

            const tempImg = new Image();

            tempImg.onload = () => {

                imgEl.src =
                    'images/' + randomImage;

                polaroid.classList.remove(
                    'loading'
                );

                textEl.innerText =
                    saying;

                polaroid.classList.remove(
                    'fade-in'
                );

                textEl.classList.remove(
                    'fade-in'
                );

                void polaroid.offsetWidth;

                polaroid.classList.add(
                    'fade-in'
                );

                textEl.classList.add(
                    'fade-in'
                );
            };

            tempImg.src =
                'images/' + randomImage;
        }

        /* ───────────────── PRELOAD IMAGES ───────────────── */

        window.addEventListener(
            'load',

            () => {

                imageNames.forEach(name => {

                    const img =
                        new Image();

                    img.src =
                        'images/' + name;
                });
            }
        );

        /* ───────────────── FLOATING HEARTS ───────────────── */

        const canvas =
            document.getElementById(
                'hearts-canvas'
            );

        const heartEmoji = [

            '❤️',
            '🩷',
            '💕',
            '💗',
            '💖',
            '🌸'
        ];

        function spawnHeart() {

            const heart =
                document.createElement(
                    'span'
                );

            heart.className =
                'heart';

            heart.textContent =
                heartEmoji[
                    Math.floor(
                        Math.random()
                        * heartEmoji.length
                    )
                ];

            const size =
                (0.8 + Math.random())
                .toFixed(2);

            const left =
                (Math.random() * 100)
                .toFixed(1);

            const duration =
                (8 + Math.random() * 8)
                .toFixed(1);

            heart.style.left =
                left + 'vw';

            heart.style.fontSize =
                size + 'em';

            heart.style.animationDuration =
                duration + 's';

            canvas.appendChild(heart);

            setTimeout(() => {

                heart.remove();

            }, duration * 1000);
        }

        for (let i = 0; i < 6; i++) {

            spawnHeart();
        }

        setInterval(
            spawnHeart,
            900
        );

    </script>

</body>

</html>
